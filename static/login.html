<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glyndwr — Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⊕</text></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0d0a09; color: #f0e0d0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.35; }
    .login-card {
      background: #1a0e0b; border: 1px solid #3d1a12; border-radius: 20px;
      padding: 40px; width: 100%; max-width: 380px;
      position: relative; z-index: 1; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 52px; color: #cc2800; line-height: 1; display: block; margin-bottom: 10px; }
    .logo-title { font-size: 22px; font-weight: 700; letter-spacing: 0.3em; }
    .logo-sub { font-size: 11px; color: #9a7a68; margin-top: 4px; letter-spacing: 0.1em; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #9a7a68; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    input {
      width: 100%; background: #241410; border: 1.5px solid #3d1a12;
      border-radius: 10px; padding: 11px 14px; color: #f0e0d0;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #cc2800; }
    input::placeholder { color: #5a3a28; }
    .btn {
      width: 100%; background: #cc2800; color: #fff; border: none;
      border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
      letter-spacing: 0.05em; margin-top: 8px;
    }
    .btn:hover { background: #e03000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(204,40,0,0.1); border: 1px solid rgba(204,40,0,0.35);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #cc2800; margin-bottom: 16px; display: none;
    }
    .hint-box {
      background: rgba(90,58,40,0.2); border: 1px solid #3d1a12;
      border-radius: 10px; padding: 14px; margin-bottom: 20px; font-size: 12px;
      color: #9a7a68; line-height: 1.6;
    }
    .hint-box strong { color: #f0e0d0; }
    .hint-box code {
      background: rgba(204,40,0,0.15); color: #cc2800;
      padding: 1px 6px; border-radius: 4px; font-family: inherit; font-size: 12px;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-note { text-align: center; font-size: 11px; color: #5a3a28; margin-top: 20px; line-height: 1.6; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="login-card">
  <div class="logo">
    <span class="logo-icon">⊕</span>
    <div class="logo-title">GLYNDWR</div>
    <div class="logo-sub">Self-hosted AI Workspace</div>
  </div>

  <div class="hint-box">
    The default username is <strong>admin</strong>.<br>
    The password was printed in the terminal when the server first started.<br>
    You can change both in <strong>Settings → Account</strong> after signing in.
  </div>

  <div class="error" id="login-error"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="login-username" value="admin" autocomplete="username" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Generated password from terminal" autocomplete="current-password" />
  </div>
  <button class="btn" id="login-btn">Sign In</button>

  <p class="footer-note">
    Glyndwr is a private, self-hosted workspace.<br>
    All data stays on your machine.
  </p>
</div>

<script>
(function() {
  /* ── Animated background ────────────────────── */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 35; i++) {
    nodes.push({
      x: Math.random() * 1200, y: Math.random() * 900,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 2 + 1, pulse: Math.random() * Math.PI * 2,
    });
  }
  function animate() {
    ctx.clearRect(0, 0, W, H);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy; n.pulse += 0.02;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 160) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(204,40,0,${0.18 * (1 - d / 160)})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      const g = 0.5 + 0.5 * Math.sin(n.pulse);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * (0.8 + 0.4 * g), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(204,40,0,${0.5 * g})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();

  /* ── Login logic ────────────────────────────── */
  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
  }
  function hideError() { document.getElementById('login-error').style.display = 'none'; }

  async function doLogin() {
    hideError();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showError('Please enter username and password.'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password }),
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        showError(d.detail || 'Invalid username or password.');
        btn.disabled = false; btn.textContent = 'Sign In';
        return;
      }
      const d = await r.json();
      localStorage.setItem('glyndwr_token', d.token);
      localStorage.setItem('glyndwr_user', JSON.stringify(d.user));
      window.location.href = '/';
    } catch {
      showError('Could not connect to the server. Is it running?');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });

  /* ── If already logged in, skip to app ─────── */
  const tok = localStorage.getItem('glyndwr_token');
  if (tok) {
    fetch('/api/auth/me', { headers: { Authorization: `Bearer ${tok}` }, credentials: 'include' })
      .then(r => { if (r.ok) window.location.href = '/'; })
      .catch(() => {});
  }

  /* ── Focus password if username already filled ─ */
  window.addEventListener('load', () => {
    const u = document.getElementById('login-username');
    const p = document.getElementById('login-password');
    if (u.value) p.focus(); else u.focus();
  });
})();
</script>
</body>
</html>
